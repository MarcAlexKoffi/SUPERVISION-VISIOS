
<!-- Delete Confirmation Modal -->
<div *ngIf="showDeleteModal" class="fixed inset-0 z-[60] flex items-center justify-center p-4">
    <!-- Backdrop -->
    <div class="fixed inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-sm transition-opacity" (click)="cancelDelete()"></div>

    <!-- Modal Content -->
    <div class="relative w-full max-w-sm bg-white dark:bg-slate-800 rounded-2xl shadow-2xl ring-1 ring-slate-900/5 dark:ring-white/10 overflow-hidden transform transition-all scale-100 opacity-100">
        <div class="p-6 text-center">
            <div class="w-12 h-12 rounded-full bg-red-100 dark:bg-red-900/30 flex items-center justify-center mx-auto mb-4 text-red-600 dark:text-red-400">
                <span class="material-symbols-outlined text-[28px]">warning</span>
            </div>
            <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-2">Confirmer la suppression</h3>
            <p class="text-sm text-slate-500 dark:text-slate-400 mb-6">
                Êtes-vous sûr de vouloir supprimer cette supervision ? Cette action est irréversible.
            </p>
            
            <div class="flex items-center gap-3">
                <button (click)="cancelDelete()" class="flex-1 px-4 py-2.5 text-sm font-semibold text-slate-700 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 focus:ring-2 focus:ring-slate-100 dark:bg-slate-800 dark:text-slate-300 dark:border-slate-700 dark:hover:bg-slate-700">
                    Annuler
                </button>
                <button (click)="confirmDelete()" class="flex-1 px-4 py-2.5 text-sm font-semibold text-white bg-red-600 border border-red-600 rounded-xl hover:bg-red-700 focus:ring-2 focus:ring-red-100 shadow-sm shadow-red-500/20">
                    Supprimer
                </button>
            </div>
        </div>
    </div>
</div>
