<div *ngIf="isOpen" class="fixed inset-0 z-[60] flex items-center justify-center p-4">
    <!-- Backdrop -->
    <div class="fixed inset-0 bg-slate-900/40 dark:bg-black/60 backdrop-blur-sm transition-opacity" (click)="onCancel()" style="z-index: 60"></div>

    <!-- Modal Content -->
    <div class="relative w-full max-w-sm bg-white dark:bg-slate-800 rounded-2xl shadow-2xl ring-1 ring-slate-900/5 dark:ring-white/10 overflow-hidden transform transition-all scale-100 opacity-100 animate-in fade-in zoom-in duration-200" style="z-index: 61">
        <div class="p-6 text-center">
            <div class="w-12 h-12 rounded-full flex items-center justify-center mx-auto mb-4"
                [ngClass]="{
                    'bg-red-100 text-red-600 dark:bg-red-900/30 dark:text-red-400': type === 'danger',
                    'bg-amber-100 text-amber-600 dark:bg-amber-900/30 dark:text-amber-400': type === 'warning',
                    'bg-blue-100 text-blue-600 dark:bg-blue-900/30 dark:text-blue-400': type === 'info'
                }">
                <span class="material-symbols-outlined text-[28px]">
                    {{ type === 'danger' ? 'warning' : (type === 'warning' ? 'help' : 'info') }}
                </span>
            </div>
            <h3 class="text-lg font-bold text-slate-900 dark:text-white mb-2">{{ title }}</h3>
            <p class="text-sm text-slate-500 dark:text-slate-400 mb-6">
                {{ message }}
            </p>
            
            <div class="flex items-center gap-3">
                <button (click)="onCancel()" class="flex-1 px-4 py-2.5 text-sm font-semibold text-slate-700 bg-white border border-slate-200 rounded-xl hover:bg-slate-50 focus:ring-2 focus:ring-slate-100 dark:bg-slate-800 dark:text-slate-300 dark:border-slate-700 dark:hover:bg-slate-700 transition-colors">
                    {{ cancelText }}
                </button>
                <button (click)="onConfirm()" class="flex-1 px-4 py-2.5 text-sm font-semibold text-white rounded-xl shadow-sm transition-colors focus:ring-2 focus:ring-offset-2"
                    [ngClass]="{
                        'bg-red-600 hover:bg-red-700 focus:ring-red-500 shadow-red-500/20': type === 'danger',
                        'bg-amber-600 hover:bg-amber-700 focus:ring-amber-500 shadow-amber-500/20': type === 'warning',
                        'bg-blue-600 hover:bg-blue-700 focus:ring-blue-500 shadow-blue-500/20': type === 'info'
                    }">
                    {{ confirmText }}
                </button>
            </div>
        </div>
    </div>
</div>
