<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SupervisionVisios</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="logoPigier.png">
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body class="bg-surface-50 font-sans text-slate-800 antialiased selection:bg-primary-100 selection:text-primary-900">
  <app-root>
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; background-color: #f8fafc;">
      <div class="spinner" style="width: 50px; height: 50px; border: 4px solid #f1f5f9; border-top-color: #14b8a6; border-radius: 50%; animation: spin 1s cubic-bezier(0.55, 0.15, 0.45, 0.85) infinite; margin-bottom: 24px;"></div>
      <h2 style="font-family: 'Plus Jakarta Sans', sans-serif; color: #475569; font-size: 1.125rem; font-weight: 500; letter-spacing: -0.01em;">Chargement de l'espace...</h2>
      <style>
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
      </style>
    </div>
  </app-root>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>
</html>
