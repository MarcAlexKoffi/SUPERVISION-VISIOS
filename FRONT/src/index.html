<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <title>SupervisionVisios</title>
  <base href="/">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <link rel="icon" type="image/png" href="logoPigier.png">
  
  <!-- Fonts -->
  <link href="https://fonts.googleapis.com" rel="preconnect"/>
  <link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
  <link href="https://fonts.googleapis.com/css2?family=Public+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
  <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@24,400,0,0" rel="stylesheet" />
  
  <!-- Tailwind Configuration -->
  <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
  <script id="tailwind-config">
    tailwind.config = {
      darkMode: "class",
      theme: {
        extend: {
          colors: {
            "primary": "#0f42a5", // Updated vibrant blue
            "background-light": "#f6f7f8",
            "background-dark": "#121820",
          },
          fontFamily: {
            "display": ["Public Sans", "sans-serif"]
          },
          borderRadius: { "DEFAULT": "0.25rem", "lg": "0.5rem", "xl": "0.75rem", "full": "9999px" },
        },
      },
    }
  </script>
  <link rel="manifest" href="manifest.webmanifest">
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-800 dark:text-slate-200">
  <app-root>
    <div style="display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100vh; width: 100vw; background-color: #f6f7f8;">
      <div class="spinner" style="width: 60px; height: 60px; border: 6px solid #e2e8f0; border-top-color: #0f42a5; border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 24px;"></div>
      <h2 style="font-family: 'Public Sans', sans-serif; color: #334155; font-size: 1.25rem; font-weight: 600; letter-spacing: 0.5px;">Chargement de l'espace...</h2>
      <style>
        @keyframes spin {
          0% { transform: rotate(0deg); }
          100% { transform: rotate(360deg); }
        }
        @media (prefers-color-scheme: dark) {
          app-root > div { background-color: #121820 !important; }
          app-root h2 { color: #e2e8f0 !important; }
          app-root .spinner { border-color: #334155 !important; border-top-color: #3b82f6 !important; }
        }
      </style>
    </div>
  </app-root>
  <noscript>Please enable JavaScript to continue using this application.</noscript>
</body>
</html>
